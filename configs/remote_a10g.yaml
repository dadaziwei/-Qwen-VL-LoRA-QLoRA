# 远程 24GB 级别 GPU 配置：用于 Qwen-VL LoRA/QLoRA 实验。
model_name: Qwen/Qwen2.5-VL-3B-Instruct
output_dir: outputs/qwen-vl-lora-remote
# 多模态样本通常更长，远程机器可以适当放宽上下文。
max_seq_length: 1024
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
num_train_epochs: 2
learning_rate: 0.0001
logging_steps: 10
save_steps: 200
lora:
  # 远程训练可以使用更高 rank，换取更好的场景适配能力。
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
